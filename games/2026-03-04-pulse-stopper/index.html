<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>パルスストッパー</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6743751614716161" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #060913;
      --panel: #10182bcc;
      --line: #7be0ff;
      --line2: #ff78c8;
      --text: #eaf5ff;
      --muted: #8fa3bf;
      --ok: #6dffb3;
      --bad: #ff6f91;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 15%, #162647, var(--bg) 58%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      touch-action: manipulation;
    }
    .game {
      width: min(100vw, 480px);
      height: 100dvh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      padding: 12px 14px max(14px, env(safe-area-inset-bottom));
      gap: 10px;
    }
    h1 {
      margin: 0;
      text-align: center;
      font-size: 1.4rem;
      letter-spacing: .04em;
    }
    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .cell {
      background: var(--panel);
      border: 1px solid #ffffff1f;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
    }
    .label { font-size: .7rem; color: var(--muted); }
    .value { font-size: 1.1rem; font-weight: 700; }
    .arena {
      position: relative;
      background: linear-gradient(180deg, #0d1630aa, #0a1325aa);
      border-radius: 14px;
      border: 1px solid #ffffff26;
      overflow: hidden;
      min-height: 280px;
    }
    canvas { width: 100%; height: 100%; display: block; }
    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #08102399, #060913b3);
      text-align: center;
      padding: 20px;
    }
    .msg { margin: 10px 0; min-height: 1.2em; font-weight: 700; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 1rem;
      font-weight: 700;
      color: #04101a;
      background: linear-gradient(135deg, #7be0ff, #6dffb3);
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .9rem;
      color: var(--muted);
    }
    a { color: #9dd8ff; text-decoration: none; }
  </style>
</head>
<body>
  <main class="game">
    <h1>🫧 パルスストッパー</h1>
    <section class="hud">
      <div class="cell"><div class="label">SCORE</div><div id="score" class="value">0</div></div>
      <div class="cell"><div class="label">TIME</div><div id="time" class="value">60.0</div></div>
      <div class="cell"><div class="label">HI</div><div id="hi" class="value">0</div></div>
    </section>
    <section class="arena" id="arena">
      <canvas id="cv" width="360" height="520" aria-label="game canvas"></canvas>
      <div class="overlay" id="overlay">
        <div>
          <p>リングがターゲット円に重なった瞬間をタップ。</p>
          <p>ジャスト連続でコンボ倍率アップ。</p>
          <button id="startBtn" type="button">スタート</button>
        </div>
      </div>
    </section>
    <div class="footer">
      <div id="judge">READY</div>
      <div id="combo">COMBO x1</div>
      <a href="../../">← 戻る</a>
    </div>
  </main>

  <script>
    (() => {
      const KEY = 'pulse-stopper-hi-v1';
      const scoreEl = document.getElementById('score');
      const timeEl = document.getElementById('time');
      const hiEl = document.getElementById('hi');
      const judgeEl = document.getElementById('judge');
      const comboEl = document.getElementById('combo');
      const overlay = document.getElementById('overlay');
      const startBtn = document.getElementById('startBtn');
      const arena = document.getElementById('arena');
      const cv = document.getElementById('cv');
      const ctx = cv.getContext('2d');

      let hi = Number(localStorage.getItem(KEY) || 0);
      hiEl.textContent = hi;

      let running = false;
      let startTs = 0;
      let lastTs = 0;
      let score = 0;
      let combo = 0;
      let ring = null;
      let raf = 0;

      const state = {
        centerX: 180,
        centerY: 260,
        targetR: 110,
        tolerance: 15,
        speed: 120,
      };

      function fitCanvas() {
        const r = arena.getBoundingClientRect();
        cv.width = Math.floor(r.width * devicePixelRatio);
        cv.height = Math.floor(r.height * devicePixelRatio);
        ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        state.centerX = r.width / 2;
        state.centerY = r.height / 2;
        state.targetR = Math.min(r.width, r.height) * 0.28;
      }

      function spawnRing() {
        ring = { r: 8 + Math.random() * 8 };
      }

      function resetGame() {
        running = true;
        score = 0;
        combo = 0;
        startTs = 0;
        lastTs = 0;
        judgeEl.textContent = 'GO';
        judgeEl.style.color = '#eaf5ff';
        scoreEl.textContent = '0';
        timeEl.textContent = '60.0';
        comboEl.textContent = 'COMBO x1';
        overlay.style.display = 'none';
        spawnRing();
      }

      function phaseConfig(t) {
        if (t < 30) return { speed: 120, tol: 15 };
        if (t < 45) return { speed: 150, tol: 12 };
        return { speed: 185, tol: 9 };
      }

      function tap() {
        if (!running || !ring) return;
        const d = Math.abs(ring.r - state.targetR);
        const hit = d <= state.tolerance;
        if (hit) {
          combo += 1;
          const mult = Math.min(4, 1 + Math.floor(combo / 3));
          score += 10 * mult;
          judgeEl.textContent = d < state.tolerance * 0.4 ? 'PERFECT' : 'GOOD';
          judgeEl.style.color = '#6dffb3';
        } else {
          combo = 0;
          score = Math.max(0, score - 6);
          judgeEl.textContent = 'MISS';
          judgeEl.style.color = '#ff6f91';
        }
        scoreEl.textContent = String(score);
        comboEl.textContent = `COMBO x${Math.max(1, 1 + Math.floor(combo / 3))}`;
        spawnRing();
      }

      function finish() {
        running = false;
        cancelAnimationFrame(raf);
        if (score > hi) {
          hi = score;
          localStorage.setItem(KEY, String(hi));
          hiEl.textContent = hi;
        }
        overlay.style.display = 'grid';
        overlay.querySelector('p').textContent = `終了！スコア ${score} / HI ${hi}`;
        overlay.querySelectorAll('p')[1].textContent = 'もう一度挑戦しよう。';
      }

      function drawBackground(w, h) {
        ctx.clearRect(0, 0, w, h);
        const grad = ctx.createRadialGradient(state.centerX, state.centerY, 10, state.centerX, state.centerY, h * 0.8);
        grad.addColorStop(0, '#1a2e55');
        grad.addColorStop(1, '#081021');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
      }

      function drawTarget() {
        ctx.beginPath();
        ctx.arc(state.centerX, state.centerY, state.targetR, 0, Math.PI * 2);
        ctx.strokeStyle = '#7be0ffaa';
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(state.centerX, state.centerY, state.targetR - state.tolerance, 0, Math.PI * 2);
        ctx.arc(state.centerX, state.centerY, state.targetR + state.tolerance, 0, Math.PI * 2, true);
        ctx.fillStyle = '#7be0ff18';
        ctx.fill('evenodd');
      }

      function drawRing() {
        if (!ring) return;
        const hue = 190 + Math.min(80, ring.r * 0.4);
        ctx.beginPath();
        ctx.arc(state.centerX, state.centerY, ring.r, 0, Math.PI * 2);
        ctx.strokeStyle = `hsl(${hue} 100% 70%)`;
        ctx.lineWidth = 5;
        ctx.shadowColor = '#ff78c8';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      function frame(ts) {
        if (!running) return;
        if (!startTs) startTs = ts;
        if (!lastTs) lastTs = ts;
        const dt = (ts - lastTs) / 1000;
        lastTs = ts;
        const elapsed = (ts - startTs) / 1000;
        const remain = Math.max(0, 60 - elapsed);
        timeEl.textContent = remain.toFixed(1);

        const p = phaseConfig(elapsed);
        state.speed = p.speed;
        state.tolerance = p.tol;

        ring.r += state.speed * dt;
        const w = cv.width / devicePixelRatio;
        const h = cv.height / devicePixelRatio;

        drawBackground(w, h);
        drawTarget();
        drawRing();

        if (ring.r > Math.max(w, h) * 0.68) {
          combo = 0;
          score = Math.max(0, score - 4);
          scoreEl.textContent = String(score);
          comboEl.textContent = 'COMBO x1';
          judgeEl.textContent = 'LATE';
          judgeEl.style.color = '#ff6f91';
          spawnRing();
        }

        if (remain <= 0) {
          finish();
          return;
        }
        raf = requestAnimationFrame(frame);
      }

      startBtn.addEventListener('pointerdown', () => {
        fitCanvas();
        resetGame();
        raf = requestAnimationFrame(frame);
      });

      arena.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        tap();
      });

      window.addEventListener('resize', fitCanvas);
      fitCanvas();
      drawBackground(cv.width / devicePixelRatio, cv.height / devicePixelRatio);
      drawTarget();
      spawnRing();
      drawRing();
    })();
  </script>
</body>
</html>
